<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="排盘">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="梅花易数排盘系统 - 纯本地运行">
  <link rel="manifest" href="manifest.json">
  <title>排盘系统</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            matrix: '#00ff41',
            cyan: '#00d4ff',
            dark: '#0a0a0a',
            card: '#111111',
            border: '#1a3a1a',
          }
        }
      }
    }
  </script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- lunar-javascript CDN (primary: jsDelivr, fallback: unpkg) -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js">
  </script>
  <script>
    // Fallback: if primary CDN fails, try unpkg
    if (typeof Solar === 'undefined' || typeof Lunar === 'undefined') {
      var fallback = document.createElement('script');
      fallback.src = 'https://unpkg.com/lunar-javascript/lunar.js';
      document.head.appendChild(fallback);
    }
  </script>
</head>
<body class="text-green-400 min-h-screen flex flex-col">

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Header -->
  <header class="px-5 pt-6 pb-3 text-center safe-top">
    <h1 class="text-2xl font-bold tracking-widest glow-text">
      &#9775; 排 盘 系 统 &#9775;
    </h1>
    <p class="text-xs text-gray-600 mt-1 tracking-wider">梅 花 易 数 · 纯 本 地 运 行</p>
  </header>

  <!-- Input Form -->
  <main class="flex-1 px-4 pt-2 pb-4 max-w-md mx-auto w-full">
    <div class="glow-border rounded-xl p-4 mb-5">
      <!-- Date -->
      <label class="block text-xs text-gray-500 mb-1.5 tracking-wider">公历日期</label>
      <input type="date" id="dateInput"
        class="w-full bg-black border border-[#1a2a1a] rounded-lg px-4 py-3.5 text-green-400 text-base mb-4 transition-colors">

      <!-- Time -->
      <label class="block text-xs text-gray-500 mb-1.5 tracking-wider">时间（精确到小时）</label>
      <input type="time" id="timeInput"
        class="w-full bg-black border border-[#1a2a1a] rounded-lg px-4 py-3.5 text-green-400 text-base mb-5 transition-colors">

      <!-- Button -->
      <button id="calcBtn" class="btn-calc w-full py-3.5 rounded-lg text-green-400 font-bold text-base tracking-widest glow-text">
        &#9775; 起 卦
      </button>
    </div>

    <!-- Results -->
    <div id="results" class="hidden space-y-4">

      <!-- Pillars -->
      <div class="glow-border rounded-xl p-4">
        <h3 class="text-xs text-gray-500 tracking-widest mb-3 text-center">四 柱 干 支</h3>
        <div class="pillar-grid" id="pillars"></div>
      </div>

      <!-- Hexagrams -->
      <div id="hexagrams" class="space-y-4"></div>

      <!-- Changing Line Info -->
      <div id="changingInfo" class="hidden glow-border rounded-xl p-4 text-center"></div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="text-center py-12">
      <div class="text-6xl mb-4 opacity-20">&#9775;</div>
      <p class="text-gray-600 text-sm tracking-wider">输入时间 · 即刻起卦</p>
    </div>

    <!-- History -->
    <div id="historySection" class="hidden mt-6 border-t border-[#111] pt-5">
      <h3 class="text-xs text-gray-500 tracking-widest mb-3">历 史 记 录</h3>
      <div id="historyList" class="space-y-0"></div>
      <button id="clearHistory" class="mt-3 text-xs text-gray-600 underline">清除记录</button>
    </div>
  </main>

  <!-- Footer -->
  <footer class="text-center py-4 text-[10px] text-gray-700 tracking-wider safe-bottom">
    纯本地运行 &middot; 不联网 &middot; 无追踪
  </footer>

  <!-- Scripts -->
  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
