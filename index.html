<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="排盘">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="梅花易数排盘系统 - 纯本地运行">
  <link rel="manifest" href="manifest.json">
  <title>排盘系统</title>

  <!-- TailwindCSS CDN -->
  <script src="https://cdn.tailwindcss.com">
  </script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            matrix: '#00ff41',
            cyan: '#00d4ff',
            dark: '#0a0a0a',
            card: '#111111',
            border: '#1a3a1a',
          }
        }
      }
    }
  </script>

  <!-- lunar-javascript CDN (primary: jsDelivr, fallback: unpkg) -->
  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js">
  </script>
  <script>
    // Fallback: if primary CDN fails, try unpkg
    if (typeof Solar === 'undefined' || typeof Lunar === 'undefined') {
      var fallback = document.createElement('script');
      fallback.src = 'https://unpkg.com/lunar-javascript/lunar.js';
      document.head.appendChild(fallback);
    }
  </script>

  <style>
    :root {
      --matrix: #00ff41;
      --cyan: #00d4ff;
      --bg: #0a0a0a;
    }

    * {
      -webkit-tap-highlight-color: transparent;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      font-family: "SF Mono", "Fira Code", "Courier New", monospace;
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #1a3a1a; border-radius: 2px; }

    /* Glow effects */
    .glow-text {
      text-shadow: 0 0 10px rgba(0, 255, 65, 0.5), 0 0 30px rgba(0, 255, 65, 0.2);
    }
    .glow-cyan {
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 30px rgba(0, 212, 255, 0.2);
    }
    .glow-border {
      box-shadow: 0 0 15px rgba(0, 255, 65, 0.1), inset 0 0 15px rgba(0, 255, 65, 0.02);
    }

    /* Input styles */
    input[type="date"],
    input[type="time"] {
      color-scheme: dark;
      -webkit-appearance: none;
      appearance: none;
    }
    input::-webkit-calendar-picker-indicator {
      filter: invert(1) sepia(100%) saturate(500%) hue-rotate(70deg);
      cursor: pointer;
      opacity: 0.7;
    }
    input:focus {
      outline: none;
      border-color: var(--matrix) !important;
      box-shadow: 0 0 20px rgba(0, 255, 65, 0.15);
    }

    /* Button */
    .btn-calc {
      background: linear-gradient(135deg, #0d3d0d 0%, #0a2a0a 100%);
      border: 1px solid #1a5a1a;
      transition: all 0.2s ease;
      letter-spacing: 0.1em;
    }
    .btn-calc:active {
      transform: scale(0.97);
      background: #0a3a0a;
      box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    }

    /* Hexagram line (yao) */
    .yao-line {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 18px;
      margin: 4px 0;
      transition: all 0.3s ease;
    }
    .yao-yang {
      width: 100%;
      max-width: 200px;
      height: 8px;
      background: var(--matrix);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
    }
    .yao-yin {
      display: flex;
      gap: 16px;
      justify-content: center;
      width: 100%;
      max-width: 200px;
    }
    .yao-yin-half {
      width: 80px;
      height: 8px;
      background: var(--matrix);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
    }
    .yao-changing .yao-yang,
    .yao-changing .yao-yin-half {
      background: var(--cyan);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.6);
      animation: pulse-line 1.5s ease-in-out infinite;
    }
    @keyframes pulse-line {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Markers */
    .yao-marker {
      font-size: 10px;
      color: #555;
      width: 32px;
      text-align: right;
      margin-right: 12px;
      flex-shrink: 0;
    }

    /* Hexagram card */
    .hex-card {
      background: #0d0d0d;
      border: 1px solid #1a2a1a;
      border-radius: 12px;
      padding: 20px 16px;
      transition: border-color 0.3s ease;
    }
    .hex-card:hover {
      border-color: #1a4a1a;
    }

    /* Pillar grid */
    .pillar-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 380px) {
      .pillar-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a0a0a;
      border: 1px solid #5a1a1a;
      color: #ff4444;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
    }

    /* History */
    .history-item {
      border-bottom: 1px solid #111;
      padding: 10px 0;
      cursor: pointer;
      transition: background 0.15s;
    }
    .history-item:active {
      background: #111;
    }

    /* Tab */
    .tab-btn {
      padding: 8px 16px;
      border-bottom: 2px solid transparent;
      color: #555;
      font-size: 14px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--matrix);
      border-bottom-color: var(--matrix);
    }
  </style>
</head>

      // ==================== HELPERS ====================

      // ==================== LUNAR LIBRARY ====================

      function getLunarLib() {
        // Try multiple global patterns
        if (typeof lunar !== 'undefined' && lunar.Solar) return lunar;
        if (typeof Solar !== 'undefined' && typeof Lunar !== 'undefined') return { Solar, Lunar };
        return null;
      }

      function getLunarData(year, month, day, hour, minute) {
        const lib = getLunarLib();
        if (!lib) throw new Error('农历库加载失败，请检查网络连接后刷新页面');

        // Use Solar.fromYmdHms if available, else Solar.fromYmd + set time
        let solar;
        if (lib.Solar.fromYmdHms) {
          solar = lib.Solar.fromYmdHms(year, month, day, hour, minute || 0, 0);
        } else if (lib.Solar.fromDate) {
          solar = lib.Solar.fromDate(new Date(year, month - 1, day, hour, minute || 0));
        } else {
          solar = lib.Solar.fromYmd(year, month, day);
        }

        const lunarData = solar.getLunar();

        return {
          yearGZ: lunarData.getYearInGanZhi(),
          monthGZ: lunarData.getMonthInGanZhi(),
          dayGZ: lunarData.getDayInGanZhi(),
          timeGZ: lunarData.getTimeInGanZhi(),
          lunarYear: lunarData.getYear(),
          lunarMonth: lunarData.getMonth(),
          lunarDay: lunarData.getDay(),
        };
      }

        const monthNum = Math.abs(lunarMonth);
        const dayNum = lunarDay;

        // Upper trigram: (yearBranch + month + day) % 8
        let upperNum = (yearBranch + monthNum + dayNum) % 8;
        if (upperNum === 0) upperNum = 8;

        // Lower trigram: (yearBranch + month + day + hourBranch) % 8
        let lowerNum = (yearBranch + monthNum + dayNum + hourBranch) % 8;
        if (lowerNum === 0) lowerNum = 8;

        // Changing line: (yearBranch + month + day + hourBranch) % 6
        let changingLine = (yearBranch + monthNum + dayNum + hourBranch) % 6;
        if (changingLine === 0) changingLine = 6;

        return { upperNum, lowerNum, changingLine };
      }

      function trigramToYao(trigramNum) {
        // Convert trigram number (1-8, 先天数) to 3 yao lines (bottom to top)
        // 1=乾☰(111) 2=兑☱(011) 3=离☲(101) 4=震☳(001) 5=巽☴(110) 6=坎☵(010) 7=艮☶(100) 8=坤☷(000)
        const map = {
          1: [1, 1, 1], // 乾
          2: [0, 1, 1], // 兑
          3: [1, 0, 1], // 离
          4: [0, 0, 1], // 震
          5: [1, 1, 0], // 巽
          6: [0, 1, 0], // 坎
          7: [1, 0, 0], // 艮
          8: [0, 0, 0], // 坤
        };
        return map[trigramNum];
      }

      function buildHexagram(upperNum, lowerNum) {
        const upperYao = trigramToYao(upperNum);
        const lowerYao = trigramToYao(lowerNum);
        // Full hexagram: bottom (line 1) to top (line 6)
        // lower trigram = lines 1-3, upper trigram = lines 4-6
        return [...lowerYao, ...upperYao];
      }

      function buildMutualHexagram(originalLines) {
        // Mutual hexagram: lines 2,3,4 → lower trigram; lines 3,4,5 → upper trigram
        const lowerTri = [originalLines[1], originalLines[2], originalLines[3]];
        const upperTri = [originalLines[2], originalLines[3], originalLines[4]];
        return [...lowerTri, ...upperTri];
      }

      function buildChangedHexagram(originalLines, changingLine) {
        const lines = [...originalLines];
        const idx = changingLine - 1; // 0-indexed
        lines[idx] = lines[idx] === 1 ? 0 : 1;
        return lines;
      }

      function yaoToTrigramNum(yao3) {
        const key = yao3.join(',');
        const map = {
          '1,1,1': 1,
          '0,1,1': 2,
          '1,0,1': 3,
          '0,0,1': 4,
          '1,1,0': 5,
          '0,1,0': 6,
          '1,0,0': 7,
          '0,0,0': 8,
        };
        return map[key] || 8;
      }

      function getHexagramInfo(lines) {
        const lowerTri = lines.slice(0, 3);
        const upperTri = lines.slice(3, 6);
        const upperNum = yaoToTrigramNum(upperTri);
        const lowerNum = yaoToTrigramNum(lowerTri);
        const key = `${upperNum}-${lowerNum}`;
        return HEXAGRAM_LOOKUP[key] || { name: '未知卦', idx: 0, desc: '' };
      }

      // ==================== RENDER ====================

      function renderYaoLine(yang, isChanging, lineNum) {
        const div = document.createElement('div');
        div.className = 'yao-line' + (isChanging ? ' yao-changing' : '');

        const marker = document.createElement('span');
        marker.className = 'yao-marker';
        marker.textContent = lineNum === 1 ? '初' : lineNum === 6 ? '上' : ['', '', '二', '三', '四', '五', ''][lineNum];
        div.appendChild(marker);

        if (yang) {
          const bar = document.createElement('div');
          bar.className = 'yao-yang';
          div.appendChild(bar);
        } else {
          const wrap = document.createElement('div');
          wrap.className = 'yao-yin';
          const h1 = document.createElement('div');
          h1.className = 'yao-yin-half';
          const h2 = document.createElement('div');
          h2.className = 'yao-yin-half';
          wrap.appendChild(h1);
          wrap.appendChild(h2);
          div.appendChild(wrap);
        }

        return div;
      }

      function renderHexagramSymbol(lines, changingLine) {
        const container = document.createElement('div');
        container.className = 'flex flex-col-reverse items-center py-2';
        // Render from bottom (line 1) to top (line 6)
        for (let i = 0; i < 6; i++) {
          const isChanging = (i + 1) === changingLine;
          container.appendChild(renderYaoLine(lines[i] === 1, isChanging, i + 1));
        }
        return container;
      }

      function renderPillar(label, ganzhi) {
        const div = document.createElement('div');
        div.className = 'bg-[#0d0d0d] border border-[#1a2a1a] rounded-lg p-2.5 text-center';
        div.innerHTML = `
          <div class="text-[10px] text-gray-600 mb-1 tracking-wider">${label}</div>
          <div class="text-lg font-bold tracking-widest glow-text">${ganzhi}</div>
        `;
        return div;
      }

      function renderHexCard(title, lines, changingLine, extraClass) {
        const info = getHexagramInfo(lines);
        const card = document.createElement('div');
        card.className = 'hex-card ' + (extraClass || '');

        // Header
        const header = document.createElement('div');
        header.className = 'text-center mb-3';
        const label = document.createElement('div');
        label.className = 'text-[10px] text-gray-600 tracking-widest mb-1';
        label.textContent = title;
        const name = document.createElement('div');
        name.className = 'text-base font-bold tracking-wider glow-text';
        name.textContent = info.name;
        const idx = document.createElement('div');
        idx.className = 'text-xs text-gray-600';
        idx.textContent = '第' + info.idx + '卦';
        header.appendChild(label);
        header.appendChild(name);
        header.appendChild(idx);
        card.appendChild(header);

        // Symbol
        card.appendChild(renderHexagramSymbol(lines, changingLine));

        // Description
        if (info.desc) {
          const desc = document.createElement('p');
          desc.className = 'text-xs text-gray-500 text-center mt-2 leading-relaxed px-1';
          desc.textContent = info.desc;
          card.appendChild(desc);
        }

        return card;
      }

      function renderResults(originalLines, mutualLines, changedLines, changingLine, lunarData) {
        // Pillars
        $pillars.innerHTML = '';
        $pillars.appendChild(renderPillar('年柱', lunarData.yearGZ));
        $pillars.appendChild(renderPillar('月柱', lunarData.monthGZ));
        $pillars.appendChild(renderPillar('日柱', lunarData.dayGZ));
        $pillars.appendChild(renderPillar('时柱', lunarData.timeGZ));

        // Hexagrams
        $hexagrams.innerHTML = '';
        $hexagrams.appendChild(renderHexCard('&#9775; 本 卦', originalLines, changingLine, ''));
        $hexagrams.appendChild(renderHexCard('&#9775; 互 卦', mutualLines, -1, ''));
        $hexagrams.appendChild(renderHexCard('&#9775; 变 卦', changedLines, -1, ''));

        // Changing line info
        const origInfo = getHexagramInfo(originalLines);
        const changedInfo = getHexagramInfo(changedLines);
        $changingInfo.classList.remove('hidden');
        $changingInfo.innerHTML = `
          <div class="text-xs text-gray-500 tracking-widest mb-2">动 爻 信 息</div>
          <div class="text-sm text-cyan-400 glow-cyan leading-relaxed">
            第 <span class="font-bold">${changingLine}</span> 爻动
            &nbsp;·&nbsp; ${origInfo.name} &rarr; ${changedInfo.name}
          </div>
          <div class="text-xs text-gray-600 mt-1">
            ${TRIGRAM_SHORT[yaoToTrigramNum(originalLines.slice(0,3))]}下
            ${TRIGRAM_SHORT[yaoToTrigramNum(originalLines.slice(3,6))]}上
            &rarr;
            ${TRIGRAM_SHORT[yaoToTrigramNum(changedLines.slice(0,3))]}下
            ${TRIGRAM_SHORT[yaoToTrigramNum(changedLines.slice(3,6))]}上
          </div>
        `;

        $empty.classList.add('hidden');
        $results.classList.remove('hidden');
      }

      // ==================== HISTORY ====================

      const HISTORY_KEY = 'paipan_history';
      const MAX_HISTORY = 20;

      function loadHistory() {
        try {
          return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
        } catch { return []; }
      }

      function saveHistory(entry) {
        const hist = loadHistory();
        // Deduplicate by timestamp
        const idx = hist.findIndex(h => h.iso === entry.iso);
        if (idx >= 0) hist.splice(idx, 1);
        hist.unshift(entry);
        if (hist.length > MAX_HISTORY) hist.pop();
        localStorage.setItem(HISTORY_KEY, JSON.stringify(hist));
        renderHistory();
      }

      function renderHistory() {
        const hist = loadHistory();
        if (hist.length === 0) {
          $historySection.classList.add('hidden');
          return;
        }
        $historySection.classList.remove('hidden');
        $historyList.innerHTML = '';
        hist.forEach((h, i) => {
          const div = document.createElement('div');
          div.className = 'history-item flex justify-between items-center text-sm';
          div.innerHTML = `
            <span class="text-gray-400">${h.iso.replace('T', ' ')}</span>
            <span class="text-green-400 font-bold tracking-wider">${h.hexName} <span class="text-[10px] text-gray-600">#${h.hexIdx}</span></span>
          `;
          div.addEventListener('click', () => {
            // Restore date/time inputs and recalculate
            const parts = h.iso.split('T');
            $date.value = parts[0];
            $time.value = parts[1] ? parts[1].slice(0, 5) : '12:00';
            calculate();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });
          $historyList.appendChild(div);
        });
      }

      function clearHistory() {
        localStorage.removeItem(HISTORY_KEY);
        renderHistory();
      }

      // ==================== MAIN ====================

      function calculate() {
        const dateVal = $date.value;
        const timeVal = $time.value || '12:00';

        if (!dateVal) {
          showToast('请选择日期');
          return;
        }

        try {
          const [y, m, d] = dateVal.split('-').map(Number);
          const [hh, mm] = timeVal.split(':').map(Number);

          if (!y || !m || !d) throw new Error('日期格式错误');

          const lunarData = getLunarData(y, m, d, hh || 12, mm || 0);

          const yearBranch = getBranchNumber(lunarData.yearGZ);
          const hourBranch = getBranchNumber(lunarData.timeGZ);

          const { upperNum, lowerNum, changingLine } = calcMeihua(yearBranch, lunarData.lunarMonth, lunarData.lunarDay, hourBranch);

          const originalLines = buildHexagram(upperNum, lowerNum);
          const mutualLines = buildMutualHexagram(originalLines);
          const changedLines = buildChangedHexagram(originalLines, changingLine);

          renderResults(originalLines, mutualLines, changedLines, changingLine, lunarData);

          // Save to history
          const origInfo = getHexagramInfo(originalLines);
          saveHistory({
            iso: dateVal + 'T' + (timeVal || '12:00'),
            hexName: origInfo.name,
            hexIdx: origInfo.idx,
          });

        } catch (err) {
          console.error(err);
          showToast('计算出错：' + (err.message || '未知错误'));
        }
      }

      // ==================== EVENTS ====================

      $btn.addEventListener('click', calculate);

      // Allow Enter key to trigger calculation
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.activeElement && document.activeElement.closest('.glow-border')) {
          calculate();
        }
      });

      $clearHistory.addEventListener('click', clearHistory);

      // ==================== SERVICE WORKER ====================

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      }

      // ==================== INIT ====================

      setNow();
      renderHistory();
    })();
  </script>
</body>
</html>
