<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="排盘">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="description" content="梅花易数排盘系统 - 纯本地运行">
  <link rel="manifest" href="manifest.json">
  <title>排盘系统</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            matrix: '#00ff41',
            cyan: '#00d4ff',
            dark: '#0a0a0a',
            card: '#111111',
            border: '#1a3a1a',
          }
        }
      }
    }
  </script>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
  <script>
    if (typeof Solar === 'undefined' || typeof Lunar === 'undefined') {
      var fb = document.createElement('script');
      fb.src = 'https://unpkg.com/lunar-javascript/lunar.js';
      document.head.appendChild(fb);
    }
  </script>
</head>
<body class="text-green-400 min-h-screen flex flex-col">

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- ==================== APP SHELL ==================== -->
  <div id="app" class="flex-1 relative max-w-md mx-auto w-full">

    <!-- ========== PAGE 1: 引擎选择 ========== -->
    <div id="page-engine" class="page active">
      <header class="px-5 pt-8 pb-6 text-center">
        <h1 class="text-2xl font-bold tracking-widest glow-text">&#9775; 排 盘 系 统 &#9775;</h1>
        <p class="text-xs text-gray-600 mt-2 tracking-wider">选择推演引擎</p>
      </header>
      <div class="px-4 space-y-3">
        <div class="engine-card active" data-engine="meihua">
          <div class="flex justify-between items-center">
            <div>
              <div class="text-base font-bold tracking-wider">&#9775; 梅 花 易 数</div>
              <div class="text-[10px] text-gray-500 mt-0.5 tracking-wider">MEIHUA YISHU</div>
            </div>
            <div class="text-[10px] text-green-400/60 border border-green-400/30 rounded px-2 py-0.5">可用</div>
          </div>
        </div>
        <div class="engine-card disabled">
          <div class="flex justify-between items-center">
            <div>
              <div class="text-base font-bold text-gray-600 tracking-wider">六 爻</div>
              <div class="text-[10px] text-gray-700 mt-0.5 tracking-wider">LIU YAO</div>
            </div>
            <div class="text-[10px] text-yellow-600/60 border border-yellow-600/30 rounded px-2 py-0.5">研发中</div>
          </div>
        </div>
        <div class="engine-card disabled">
          <div class="flex justify-between items-center">
            <div>
              <div class="text-base font-bold text-gray-600 tracking-wider">大 六 壬</div>
              <div class="text-[10px] text-gray-700 mt-0.5 tracking-wider">DA LIU REN</div>
            </div>
            <div class="text-[10px] text-yellow-600/60 border border-yellow-600/30 rounded px-2 py-0.5">研发中</div>
          </div>
        </div>
        <div class="engine-card disabled">
          <div class="flex justify-between items-center">
            <div>
              <div class="text-base font-bold text-gray-600 tracking-wider">奇 门 遁 甲</div>
              <div class="text-[10px] text-gray-700 mt-0.5 tracking-wider">QI MEN DUN JIA</div>
            </div>
            <div class="text-[10px] text-yellow-600/60 border border-yellow-600/30 rounded px-2 py-0.5">研发中</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== PAGE 2: 起卦方式 ========== -->
    <div id="page-method" class="page">
      <header class="px-5 pt-6 pb-4 flex items-center gap-3">
        <button class="back-btn" data-back="engine">&larr; 返回</button>
        <div class="flex-1 text-center">
          <h2 class="text-lg font-bold tracking-widest glow-text">起 卦 方 式</h2>
        </div>
        <div style="width:52px"></div>
      </header>
      <div class="px-4 space-y-3">
        <div class="method-card" data-method="time">
          <div class="text-center">
            <div class="text-2xl mb-1">&#9200;</div>
            <div class="text-sm font-bold tracking-wider">时间起卦</div>
            <div class="text-[10px] text-gray-600 mt-1">以农历年月日时取数</div>
          </div>
        </div>
        <div class="method-card" data-method="number">
          <div class="text-center">
            <div class="text-2xl mb-1">&#128290;</div>
            <div class="text-sm font-bold tracking-wider">报数起卦</div>
            <div class="text-[10px] text-gray-600 mt-1">手动输入三个数字</div>
          </div>
        </div>
        <div class="method-card" data-method="random">
          <div class="text-center">
            <div class="text-2xl mb-1">&#127922;</div>
            <div class="text-sm font-bold tracking-wider">随机起卦</div>
            <div class="text-[10px] text-gray-600 mt-1">系统随机生成卦象</div>
          </div>
        </div>
      </div>
    </div>

    <!-- ========== PAGE 3: 参数注入 ========== -->
    <div id="page-params" class="page">
      <header class="px-5 pt-6 pb-4 flex items-center gap-3">
        <button class="back-btn" data-back="method">&larr; 返回</button>
        <div class="flex-1 text-center">
          <h2 class="text-lg font-bold tracking-widest glow-text">参 数 注 入</h2>
        </div>
        <div style="width:52px"></div>
      </header>
      <div class="px-4 space-y-4">
        <!-- 占问事由 -->
        <div>
          <label class="block text-xs text-gray-500 mb-1.5 tracking-wider">&#9775; 占问事由 <span class="text-red-500">*</span></label>
          <input type="text" id="paramQuestion"
            class="w-full bg-black border border-[#1a3a1a] rounded-lg px-4 py-3.5 text-green-400 text-base transition-colors focus:outline-none focus:border-[#00ff41]"
            placeholder="例如：今日出行如何？">
        </div>

        <!-- 时间起卦面板 -->
        <div id="panel-time" class="param-panel hidden">
          <label class="block text-xs text-gray-500 mb-1.5 tracking-wider">&#9200; 选择时间</label>
          <div class="flex gap-2 mb-3">
            <input type="datetime-local" id="paramTime"
              class="flex-1 bg-black border border-[#1a3a1a] rounded-lg px-4 py-3.5 text-green-400 text-base transition-colors focus:outline-none focus:border-[#00ff41]"
              style="color-scheme:dark">
            <button id="btnNow" class="btn-cyber px-4 py-3.5 rounded-lg text-xs font-bold tracking-wider whitespace-nowrap">
              &#9200; 此刻
            </button>
          </div>
        </div>

        <!-- 报数起卦面板 -->
        <div id="panel-number" class="param-panel hidden">
          <label class="block text-xs text-gray-500 mb-1.5 tracking-wider">&#128290; 输入三个数字（1-999）</label>
          <div class="flex gap-2">
            <div class="flex-1 text-center">
              <input type="number" id="paramNum1" min="1" max="999"
                class="w-full bg-black border border-[#1a3a1a] rounded-lg px-1 py-3.5 text-green-400 text-base text-center transition-colors focus:outline-none focus:border-[#00ff41]"
                placeholder="上卦">
              <span class="text-[10px] text-gray-600 mt-1 block">上卦数</span>
            </div>
            <div class="flex-1 text-center">
              <input type="number" id="paramNum2" min="1" max="999"
                class="w-full bg-black border border-[#1a3a1a] rounded-lg px-1 py-3.5 text-green-400 text-base text-center transition-colors focus:outline-none focus:border-[#00ff41]"
                placeholder="下卦">
              <span class="text-[10px] text-gray-600 mt-1 block">下卦数</span>
            </div>
            <div class="flex-1 text-center">
              <input type="number" id="paramNum3" min="1" max="999"
                class="w-full bg-black border border-[#1a3a1a] rounded-lg px-1 py-3.5 text-green-400 text-base text-center transition-colors focus:outline-none focus:border-[#00ff41]"
                placeholder="动爻">
              <span class="text-[10px] text-gray-600 mt-1 block">动爻数</span>
            </div>
          </div>
        </div>

        <!-- 推演按钮 -->
        <button id="btnSubmit" class="btn-calc w-full py-3.5 rounded-lg text-green-400 font-bold text-base tracking-widest glow-text mt-4">
          &#9775; 推 演
        </button>
      </div>
    </div>

    <!-- ========== PAGE 4: 控制台仪表盘 ========== -->
    <div id="page-dashboard" class="page">
      <!-- Header bar -->
      <div class="flex items-center justify-between px-4 pt-4 pb-2">
        <button id="btnNewReading" class="back-btn">&larr; 新排盘</button>
        <span class="text-[10px] text-gray-600 tracking-wider">DASHBOARD</span>
        <div style="width:52px"></div>
      </div>

      <div class="px-3 pb-6 space-y-4">

        <!-- 区块 A: 元数据头 -->
        <div id="sect-meta" class="sect-card space-y-2">
          <div id="metaQuestion" class="text-base font-bold tracking-wider text-center glow-text"></div>
          <div class="flex justify-center gap-2">
            <span id="metaBadge" class="text-[10px] px-2 py-0.5 rounded border"></span>
          </div>
          <div class="grid grid-cols-2 gap-x-4 gap-y-1 text-xs">
            <div><span class="text-gray-600">公历</span> <span id="metaSolar" class="text-gray-400"></span></div>
            <div><span class="text-gray-600">农历</span> <span id="metaLunar" class="text-gray-400"></span></div>
            <div class="col-span-2">
              <span class="text-gray-600">四柱</span>
              <span id="metaPillars" class="text-green-400 font-bold tracking-wider ml-1"></span>
              <span class="text-gray-600 ml-1">空亡</span>
              <span id="metaEmpty" class="text-yellow-500/70 ml-0.5"></span>
            </div>
          </div>
        </div>

        <!-- 区块 B: 图形阵列 -->
        <div class="sect-card">
          <div class="flex items-center justify-between mb-3">
            <span class="text-[10px] text-gray-500 tracking-wider">卦 象 阵 列</span>
            <div class="flex gap-3">
              <label class="toggle-label">
                <input type="checkbox" id="togglePalace" class="toggle-input">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="text-[10px] text-gray-500 ml-1.5">宫位</span>
              </label>
              <label class="toggle-label">
                <input type="checkbox" id="toggleCuoZong" class="toggle-input">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span class="text-[10px] text-gray-500 ml-1.5">错综卦</span>
              </label>
            </div>
          </div>
          <div id="hexRow" class="flex gap-2 overflow-x-auto pb-1"></div>
        </div>

        <!-- 区块 C: 聚合断语区 -->
        <div class="sect-card">
          <h3 class="text-[10px] text-gray-500 tracking-widest mb-2">聚 合 断 语</h3>
          <div id="judgmentsList" class="space-y-1.5"></div>
        </div>

        <!-- 区块 D: AI 赛博终端 -->
        <div class="sect-card terminal-panel">
          <div class="flex items-center justify-between mb-2">
            <span class="text-[10px] text-gray-500 tracking-wider flex items-center gap-1">
              <span class="w-2 h-2 rounded-full bg-green-500 inline-block"></span> AI 终端
            </span>
            <div class="flex gap-2">
              <button id="btnCopy" class="btn-terminal text-[10px] px-2.5 py-1 rounded border border-gray-700 text-gray-500 tracking-wider">
                &#128203; 复制卦象
              </button>
              <button id="btnAI" class="btn-terminal text-[10px] px-2.5 py-1 rounded border border-[#1a3a1a] text-green-400/70 tracking-wider">
                &#9889; 启动 AI 断卦
              </button>
            </div>
          </div>
          <div id="terminalOutput" class="terminal-body text-xs text-gray-500 leading-relaxed">
            <span class="text-green-400/50">$</span> 准备就绪。点击"启动 AI 断卦"开始推演...
          </div>
        </div>

      </div>
    </div>

  </div>

  <footer class="text-center py-3 text-[10px] text-gray-700 tracking-wider safe-bottom">
    纯本地运行 &middot; 不联网 &middot; 无追踪
  </footer>

  <script src="core.js"></script>
  <script src="app.js"></script>
</body>
</html>
